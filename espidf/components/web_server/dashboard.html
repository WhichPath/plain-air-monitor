<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sensor</title>
  <style>
    :root{color-scheme:dark;--bg:#0e1116;--panel:#171c24;--line:#2a313d;--text:#edf1f7;--muted:#9aa6b2;--good:#39d98a;--warn:#ffce56;--bad:#ff6b6b;--blue:#5eb1ff;--green:#39d98a;--yellow:#ffce56;--red:#ff7a7a}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font:13px/1.35 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0;overflow:hidden}
    header{height:54px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);background:#111720}
    h1{font-size:18px;margin:0;font-weight:650}.sub{color:var(--muted);font-size:11px;margin-top:1px}.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);white-space:nowrap}.dot{width:8px;height:8px;border-radius:50%;background:var(--warn)}.dot.ok{background:var(--good)}.dot.bad{background:var(--bad)}
    main{height:calc(100dvh - 54px);max-width:1000px;margin:0 auto;padding:10px;display:grid;grid-template-rows:auto minmax(160px,1fr) auto;gap:10px}
    .realtime{display:grid;grid-template-columns:1fr 1fr;gap:10px}.panel{min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px}.panel h2{margin:0 0 8px;font-size:13px;font-weight:650;color:var(--muted)}
    .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}.metric{min-width:0}.label{color:var(--muted);font-size:11px}.value{font-size:20px;font-weight:720;margin-top:2px;white-space:nowrap}.unit{font-size:10px;color:var(--muted);margin-left:2px;font-weight:500}
    .chart{min-height:0}.chart canvas{width:100%;height:100%;display:block}.status{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.status .item{min-width:0}.status span{display:block;color:var(--muted);font-size:10px}.status b{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;margin-top:2px}
    @media(min-width:760px){body{font-size:14px}header{height:62px;padding:12px 18px}h1{font-size:20px}.sub{font-size:12px}main{height:calc(100dvh - 62px);padding:14px;gap:12px;grid-template-rows:auto minmax(240px,1fr) auto}.panel{padding:14px}.value{font-size:28px}.status b{font-size:13px}}
    @media(max-width:370px){main{padding:8px;gap:8px}.realtime{gap:8px}.panel{padding:8px}.metrics{gap:6px}.value{font-size:18px}.status{gap:6px}}
  </style>
</head>
<body>
  <header>
    <div><h1>Sensor</h1><div class="sub">SPS30 over Tailscale</div></div>
    <div class="pill"><i id="dot" class="dot"></i><span id="state">starting</span></div>
  </header>
  <main>
    <section class="realtime" aria-label="实时数据">
      <div class="panel">
        <h2>PM Mass</h2>
        <div class="metrics">
          <div class="metric"><div class="label">PM1.0</div><div class="value"><span id="pm1">--</span><span class="unit">ug/m3</span></div></div>
          <div class="metric"><div class="label">PM2.5</div><div class="value"><span id="pm25">--</span><span class="unit">ug/m3</span></div></div>
          <div class="metric"><div class="label">PM4</div><div class="value"><span id="pm4">--</span><span class="unit">ug/m3</span></div></div>
          <div class="metric"><div class="label">PM10</div><div class="value"><span id="pm10">--</span><span class="unit">ug/m3</span></div></div>
        </div>
      </div>
      <div class="panel">
        <h2>NC Count</h2>
        <div class="metrics">
          <div class="metric"><div class="label">NC0.5</div><div class="value"><span id="nc05">--</span><span class="unit">#/cm3</span></div></div>
          <div class="metric"><div class="label">NC1.0</div><div class="value"><span id="nc10">--</span><span class="unit">#/cm3</span></div></div>
          <div class="metric"><div class="label">NC2.5</div><div class="value"><span id="nc25">--</span><span class="unit">#/cm3</span></div></div>
          <div class="metric"><div class="label">NC10</div><div class="value"><span id="nc100">--</span><span class="unit">#/cm3</span></div></div>
        </div>
      </div>
    </section>
    <section class="panel chart" aria-label="闪存趋势图"><canvas id="chart"></canvas></section>
    <section class="panel status" aria-label="状态">
      <div class="item"><span>Tailnet</span><b id="vpn">--</b></div>
      <div class="item"><span>RSSI</span><b id="rssi">--</b></div>
      <div class="item"><span>Data</span><b id="data_count">--</b></div>
      <div class="item"><span>Uptime</span><b id="uptime">--</b></div>
    </section>
  </main>
  <script>
    const $=id=>document.getElementById(id),fmt=(v,d=1)=>Number.isFinite(v)?v.toFixed(d):'--';let records=[];
    function setMetric(id,value,d=1){$(id).textContent=fmt(value,d)}
    function updateRealtime(m){const ok=m.sensor&&m.sensor.state==='measuring'&&m.latest;$('dot').className='dot '+(ok?'ok':(m.sensor&&m.sensor.state==='error'?'bad':''));$('state').textContent=ok?'live':(m.sensor?m.sensor.state:'offline');if(m.latest){let x=m.latest;setMetric('pm1',x.pm1_0);setMetric('pm25',x.pm2_5);setMetric('pm4',x.pm4_0);setMetric('pm10',x.pm10_0);setMetric('nc05',x.nc0_5,0);setMetric('nc10',x.nc1_0,0);setMetric('nc25',x.nc2_5,0);setMetric('nc100',x.nc10_0,0)}$('vpn').textContent=m.vpn_ip||'--';$('rssi').textContent=m.wifi_rssi?m.wifi_rssi+' dBm':'--';$('data_count').textContent=(m.data?m.data.stored:0)+' saved';let s=Math.floor(m.uptime_ms/1000);$('uptime').textContent=Math.floor(s/3600)+'h '+Math.floor(s%3600/60)+'m'}
    async function pollRealtime(){try{updateRealtime(await fetch('/api/metrics',{cache:'no-store'}).then(r=>r.json()))}catch(e){$('state').textContent='offline';$('dot').className='dot bad'}}
    async function loadData(){try{let h=await fetch('/api/data',{cache:'no-store'}).then(r=>r.json());records=h.records||[];draw()}catch(e){records=[];draw()}}
    function timeLabel(ms){let s=Math.max(0,Math.floor(ms/1000)),h=Math.floor(s/3600),m=Math.floor(s%3600/60);return h?h+'h'+String(m).padStart(2,'0'):m+'m'}
    function draw(){const c=$('chart'),r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;c.width=Math.max(1,r.width*d);c.height=Math.max(1,r.height*d);const g=c.getContext('2d');g.scale(d,d);g.clearRect(0,0,r.width,r.height);const pad={l:44,t:46,r:12,b:28},w=Math.max(1,r.width-pad.l-pad.r),h=Math.max(1,r.height-pad.t-pad.b);g.font='11px system-ui';g.fillStyle='#9aa6b2';g.fillText('Flash 10 min PM avg trend',pad.l,15);const keys=[['pm2_5_avg','#5eb1ff','PM2.5 avg'],['pm10_0_avg','#ff7a7a','PM10 avg']];keys.forEach(([k,col,name],i)=>{let x=pad.l+i*92,y=30;g.strokeStyle=col;g.lineWidth=2;g.beginPath();g.moveTo(x,y-3);g.lineTo(x+14,y-3);g.stroke();g.fillStyle='#c9d2dc';g.fillText(name,x+18,y)});if(!records.length){g.fillStyle='#9aa6b2';g.fillText('No stored 10 min records yet',pad.l,pad.t+18);return}let vals=records.flatMap(p=>keys.map(k=>p[k[0]])).filter(Number.isFinite),max=Math.max(10,...vals),top=Math.ceil(max/10)*10;g.strokeStyle='#2a313d';g.fillStyle='#9aa6b2';g.lineWidth=1;for(let i=0;i<4;i++){let y=pad.t+i*h/3,val=top-(top*i/3);g.beginPath();g.moveTo(pad.l,y);g.lineTo(pad.l+w,y);g.stroke();g.fillText(String(Math.round(val)),6,y+4)}g.beginPath();g.moveTo(pad.l,pad.t);g.lineTo(pad.l,pad.t+h);g.lineTo(pad.l+w,pad.t+h);g.stroke();let step=Math.max(1,Math.ceil(records.length/5));records.forEach((p,i)=>{if(i%step&&i!==records.length-1)return;let x=pad.l+i*w/Math.max(1,records.length-1);g.fillText(timeLabel(p.end_ms||p.start_ms||0),Math.min(x,pad.l+w-32),r.height-8)});keys.forEach(([k,col])=>{g.strokeStyle=col;g.lineWidth=2;g.beginPath();records.forEach((p,i)=>{let x=pad.l+i*w/Math.max(1,records.length-1),y=pad.t+h-(Math.max(0,p[k]||0)/top)*h;i?g.lineTo(x,y):g.moveTo(x,y)});g.stroke()})}
    setInterval(pollRealtime,2000);setInterval(loadData,60000);addEventListener('resize',draw);pollRealtime();loadData();
  </script>
</body>
</html>
