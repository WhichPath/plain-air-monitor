<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>空气传感器</title>
  <style>
    :root{color-scheme:dark;--bg:#0e1116;--panel:#171c24;--line:#2a313d;--text:#edf1f7;--muted:#9aa6b2;--good:#39d98a;--warn:#ffce56;--bad:#ff6b6b;--blue:#5eb1ff;--green:#39d98a;--yellow:#ffce56;--red:#ff7a7a}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font:13px/1.35 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0;overflow:hidden}
    header{height:54px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);background:#111720}
    h1{font-size:18px;margin:0;font-weight:650}.sub{color:var(--muted);font-size:11px;margin-top:1px}.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);white-space:nowrap}.dot{width:8px;height:8px;border-radius:50%;background:var(--warn)}.dot.ok{background:var(--good)}.dot.bad{background:var(--bad)}
    main{height:calc(100dvh - 54px);max-width:1000px;margin:0 auto;padding:10px;display:grid;grid-template-rows:auto minmax(160px,1fr) auto;gap:10px}
    .realtime{display:grid;grid-template-columns:1fr 1fr;gap:10px}.panel{min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px}.panel h2{margin:0 0 8px;font-size:13px;font-weight:650;color:var(--muted)}
    .metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}.env-metrics{height:calc(100% - 25px);align-content:center}.metric{min-width:0}.label{color:var(--muted);font-size:11px}.value{font-size:20px;font-weight:720;margin-top:2px;white-space:nowrap}.unit{font-size:10px;color:var(--muted);margin-left:2px;font-weight:500}
    .chart{min-height:0;position:relative}.chart canvas{width:100%;height:100%;display:block;touch-action:manipulation}.tip{position:absolute;display:none;min-width:132px;max-width:188px;padding:7px 8px;border:1px solid var(--line);border-radius:7px;background:#111720;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.28);font-size:11px;line-height:1.35;pointer-events:none;z-index:2}.tip b{display:block;margin-bottom:3px;font-size:11px}.tip span{display:block;color:var(--muted)}
    .status{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.status .item{min-width:0}.status span{display:block;color:var(--muted);font-size:10px}.status b{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;margin-top:2px}
    @media(min-width:760px){body{font-size:14px}header{height:62px;padding:12px 18px}h1{font-size:20px}.sub{font-size:12px}main{height:calc(100dvh - 62px);padding:14px;gap:12px;grid-template-rows:auto minmax(240px,1fr) auto}.panel{padding:14px}.value{font-size:28px}.status b{font-size:13px}}
    @media(max-width:370px){main{padding:8px;gap:8px}.realtime{gap:8px}.panel{padding:8px}.metrics{gap:6px}.value{font-size:18px}.status{gap:6px}}
  </style>
</head>
<body>
  <header>
    <div><h1>空气传感器</h1><div class="sub">SPS30 + SHT45</div></div>
    <div class="pill"><i id="dot" class="dot"></i><span id="state">启动中</span></div>
  </header>
  <main>
    <section class="realtime" aria-label="实时数据">
      <div class="panel">
        <h2>PM 质量</h2>
        <div class="metrics">
          <div class="metric"><div class="label">PM1.0</div><div class="value"><span id="pm1">--</span><span class="unit">ug/m3</span></div></div>
          <div class="metric"><div class="label">PM2.5</div><div class="value"><span id="pm25">--</span><span class="unit">ug/m3</span></div></div>
          <div class="metric"><div class="label">PM4</div><div class="value"><span id="pm4">--</span><span class="unit">ug/m3</span></div></div>
          <div class="metric"><div class="label">PM10</div><div class="value"><span id="pm10">--</span><span class="unit">ug/m3</span></div></div>
        </div>
      </div>
      <div class="panel">
        <h2>温湿度</h2>
        <div class="metrics env-metrics">
          <div class="metric"><div class="label">温度</div><div class="value"><span id="temp">--</span><span class="unit">C</span></div></div>
          <div class="metric"><div class="label">湿度</div><div class="value"><span id="hum">--</span><span class="unit">%RH</span></div></div>
        </div>
      </div>
    </section>
    <section class="panel chart" aria-label="闪存趋势图"><canvas id="chart"></canvas><div id="tip" class="tip"></div></section>
    <section class="panel status" aria-label="状态">
      <div class="item"><span>内网</span><b id="vpn">--</b></div>
      <div class="item"><span>信号</span><b id="rssi">--</b></div>
      <div class="item"><span>数据</span><b id="data_count">--</b></div>
      <div class="item"><span>运行</span><b id="uptime">--</b></div>
    </section>
  </main>
  <script>
    const $=id=>document.getElementById(id),fmt=(v,d=1)=>Number.isFinite(v)?v.toFixed(d):'--';
    const FIELD_TEMP=4,FIELD_HUM=8,FIELD_PM25=1,FIELD_PM10=2;
    let records=[],active=null,chartNodes=[],hoverNode=null;
    function setMetric(id,value,d=1){$(id).textContent=fmt(value,d)}
    function uptime(ms){let s=Math.max(0,Math.floor(ms/1000)),d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);return d?d+'d '+h+'h':h+'h '+m+'m'}
    function updateRealtime(m){
      const sensorOk=m.sensor&&m.sensor.state==='measuring',envOk=m.sht45&&m.sht45.state==='measuring';
      const ok=sensorOk&&m.latest;
      $('dot').className='dot '+(ok?'ok':(m.sensor&&m.sensor.state==='error'?'bad':''));
      $('state').textContent=ok?(envOk?'在线':'颗粒物在线'):(m.sensor&&m.sensor.state==='error'?'异常':'离线');
      if(m.latest){let x=m.latest;setMetric('pm1',x.pm1_0);setMetric('pm25',x.pm2_5);setMetric('pm4',x.pm4_0);setMetric('pm10',x.pm10_0);setMetric('temp',x.has_temperature?x.temperature_c:NaN,1);setMetric('hum',x.has_humidity?x.humidity_percent:NaN,1)}
      $('vpn').textContent=m.wifi_ip||'--';
      $('rssi').textContent=Number.isFinite(m.wifi_rssi)?m.wifi_rssi+' dBm':'--';
      $('data_count').textContent=(m.data?m.data.stored:0)+' 条';
      $('uptime').textContent=uptime(m.uptime_ms||0);
    }
    async function pollRealtime(){try{updateRealtime(await fetch('/api/metrics',{cache:'no-store'}).then(r=>r.json()))}catch(e){$('state').textContent='离线';$('dot').className='dot bad'}}
    async function loadData(){
      try{
        let h=await fetch('/api/data?limit=24',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('data '+r.status);return r.json()});
        records=h.records||[];
        active=h.active&&h.active.sample_count&&h.active.start_epoch_ms?Object.assign({end_epoch_ms:h.active.start_epoch_ms+h.active.elapsed_ms},h.active):null;
        draw();
      }catch(e){if(!records.length&&!active)draw();setTimeout(loadData,5000)}
    }
    function ago(epoch){if(!epoch)return'时间未同步';let h=Math.max(0,(Date.now()-epoch)/3600000);return h<1?Math.round(h*60)+'分钟前':h<24?Math.round(h)+'小时前':Math.round(h/24)+'天前'}
    function niceStep(range){let raw=range/3,p=Math.pow(10,Math.floor(Math.log10(raw||1))),n=raw/p;return (n<=1?1:n<=2?2:n<=5?5:10)*p}
    function yBounds(vals){
      let min=Math.min(...vals),max=Math.max(...vals),range=max-min;
      if(!Number.isFinite(range))return{min:0,max:10,step:5};
      let pad=Math.max(range*.25,range<2?.5:1),lo=min-pad,hi=max+pad,step=niceStep(hi-lo);
      lo=Math.floor(lo/step)*step;hi=Math.ceil(hi/step)*step;if(lo<0&&min>=0)lo=0;if(hi<=lo)hi=lo+step*3;return{min:lo,max:hi,step};
    }
    function hasValue(p,s){return p&&Number.isFinite(p[s.key])&&(!s.field||(p.field_mask&s.field))}
    function drawBand(g,band,points,series){
      g.save();
      g.beginPath();g.rect(band.x-40,band.y,band.w+40,band.h);g.clip();
      let vals=points.flatMap(p=>series.map(s=>hasValue(p,s)?p[s.key]:NaN)).filter(Number.isFinite);
      g.fillStyle='#c9d2dc';g.font='11px system-ui';g.textAlign='left';g.fillText(band.title,band.x,band.y+12);
      series.forEach((s,i)=>{let x=band.x+66+i*76,y=band.y+12;g.strokeStyle=s.color;g.lineWidth=2;g.beginPath();g.moveTo(x,y-4);g.lineTo(x+14,y-4);g.stroke();g.fillStyle='#9aa6b2';g.fillText(s.name,x+18,y)});
      if(!vals.length){g.fillStyle='#9aa6b2';g.textAlign='center';g.fillText('数据收集中',band.x+band.w/2,band.y+band.h/2);g.restore();return}
      let bounds=yBounds(vals),plotTop=band.y+20,plotH=band.h-26;
      function px(i){return band.x+i*band.w/23}
      function py(v){return plotTop+plotH-((v-bounds.min)/(bounds.max-bounds.min))*plotH}
      g.strokeStyle='#2a313d';g.lineWidth=1;g.fillStyle='#9aa6b2';g.textAlign='right';
      for(let v=bounds.min,i=0;v<=bounds.max+Math.abs(bounds.step*.01)&&i<6;v+=bounds.step,i++){let y=py(v);g.beginPath();g.moveTo(band.x,y);g.lineTo(band.x+band.w,y);g.stroke();g.fillText(Math.abs(v)>=10?String(Math.round(v)):v.toFixed(1),band.x-7,y+4)}
      series.forEach(s=>{
        let prev=null;
        points.forEach((p,i)=>{if(!hasValue(p,s))return;let x=px(i),y=py(p[s.key]);if(prev){g.save();g.strokeStyle=s.color;g.lineWidth=2;if(i-prev.i>1)g.setLineDash([5,4]);g.beginPath();g.moveTo(prev.x,prev.y);g.lineTo(x,y);g.stroke();g.restore()}prev={x,y,i}});
        points.forEach((p,i)=>{if(!hasValue(p,s))return;let x=px(i),y=py(p[s.key]),hot=hoverNode&&hoverNode.point===p&&hoverNode.key===s.key;g.fillStyle='#171c24';g.strokeStyle=s.color;g.lineWidth=hot?2.5:2;g.beginPath();g.arc(x,y,hot?4.5:3.2,0,Math.PI*2);g.fill();g.stroke();chartNodes.push({x,y,point:p,series:s,value:p[s.key]})});
      });
      g.restore();
    }
    function draw(){
      const c=$('chart'),tip=$('tip'),r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;
      c.width=Math.max(1,r.width*d);c.height=Math.max(1,r.height*d);
      const g=c.getContext('2d');g.scale(d,d);g.clearRect(0,0,r.width,r.height);chartNodes=[];tip.style.display='none';
      const compact=r.width<520,pad={l:compact?36:42,t:14,r:12,b:30},w=Math.max(1,r.width-pad.l-pad.r),h=Math.max(1,r.height-pad.t-pad.b),bucket=600000;
      const latest=active&&active.start_epoch_ms?active.start_epoch_ms:Math.floor(Date.now()/bucket)*bucket,start=latest-23*bucket;
      const source=active?records.concat([active]):records,byBucket=new Map(source.filter(p=>p.start_epoch_ms>0).map(p=>[Math.floor(p.start_epoch_ms/bucket)*bucket,p]));
      const points=Array.from({length:24},(_,i)=>byBucket.get(start+i*bucket)||null);
      const gap=8,bandH=(h-gap*2)/3,bands=[
        {x:pad.l,y:pad.t,w,h:bandH,title:'温度'},
        {x:pad.l,y:pad.t+bandH+gap,w,h:bandH,title:'湿度'},
        {x:pad.l,y:pad.t+(bandH+gap)*2,w,h:bandH,title:'颗粒物'}
      ];
      drawBand(g,bands[0],points,[{key:'temperature_avg',field:FIELD_TEMP,color:'#ffce56',name:'温度',unit:'C',digits:1}]);
      drawBand(g,bands[1],points,[{key:'humidity_avg',field:FIELD_HUM,color:'#39d98a',name:'湿度',unit:'%RH',digits:1}]);
      drawBand(g,bands[2],points,[{key:'pm2_5_avg',field:FIELD_PM25,color:'#5eb1ff',name:'PM2.5',unit:'ug/m3',digits:2},{key:'pm10_0_avg',field:FIELD_PM10,color:'#ff7a7a',name:'PM10',unit:'ug/m3',digits:2}]);
      g.strokeStyle='#2a313d';g.beginPath();bands.slice(1).forEach(b=>{g.moveTo(pad.l,b.y-gap/2);g.lineTo(pad.l+w,b.y-gap/2)});g.stroke();
      const axisY=pad.t+h,ticks=compact?[['4小时前',0],['2小时前',.5],['现在',1]]:[['4小时前',0],['3小时前',.25],['2小时前',.5],['1小时前',.75],['现在',1]];
      ticks.forEach(([label,t])=>{let x=pad.l+w*t;g.fillStyle='#9aa6b2';g.textAlign=t===1?'right':t===0?'left':'center';g.fillText(label,x,r.height-10);g.strokeStyle='#2a313d';g.beginPath();g.moveTo(x,axisY);g.lineTo(x,axisY+4);g.stroke()});
      if(hoverNode&&!chartNodes.some(n=>n.point===hoverNode.point&&n.series.key===hoverNode.series.key))hoverNode=null;
      if(hoverNode)showTip(hoverNode);
    }
    function nearestNode(ev){const r=$('chart').getBoundingClientRect(),x=ev.clientX-r.left,y=ev.clientY-r.top;let best=null,dist=18*18;chartNodes.forEach(n=>{let dx=n.x-x,dy=n.y-y,d=dx*dx+dy*dy;if(d<dist){dist=d;best=n}});return best}
    function showTip(n){
      const c=$('chart'),tip=$('tip'),box=c.parentElement.getBoundingClientRect(),s=n.series;
      tip.innerHTML='<b>'+s.name+' '+fmt(n.value,s.digits)+' '+s.unit+'</b><span>'+ago(n.point.end_epoch_ms||0)+'</span><span>样本 '+(n.point.sample_count||0)+' 个</span>';
      tip.style.display='block';
      let left=c.offsetLeft+n.x+12,top=c.offsetTop+n.y-10;
      tip.style.left=Math.min(Math.max(8,left),box.width-tip.offsetWidth-8)+'px';
      tip.style.top=Math.min(Math.max(8,top),box.height-tip.offsetHeight-8)+'px';
    }
    function chartPointer(ev){let n=nearestNode(ev);if(n!==hoverNode){hoverNode=n;draw()}}
    $('chart').addEventListener('pointermove',chartPointer);$('chart').addEventListener('pointerdown',chartPointer);$('chart').addEventListener('pointerleave',()=>{hoverNode=null;draw()});
    setInterval(pollRealtime,2000);setInterval(loadData,60000);addEventListener('resize',draw);pollRealtime();loadData();
  </script>
</body>
</html>
